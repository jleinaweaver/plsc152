This week we grapple with a HUGE question in IR: **Why do wars happen?**

&lt;br&gt;
It's actually a MUCH tougher question to answer than you might think.

- Given that they are hugely costly in terms of blood and treasure, why would any country actively decide to use war to get what it wants?

&lt;br&gt;

World War I Example

- 4 years, approx 30 countries

- Nearly 10 million soldiers killed, 21 million wounded

- Costs hundreds of billions of dollars

- Leads to the collapse of four empires
    - The Russian Empire, the German Empire, the Austro-Hungarian Empire and the Ottoman Empire
    
- Results in the Bolsheviks taking over Russia and fascists taking over Italy

- Spreads the flu epidemic that killed 25 million around the world

- and on, and on.

&lt;br&gt;

### What lesson do the countries and leaders of the world learn from all these horrible outcomes?

(SLIDE: Let's do it again!)


---

background-image: url('libs/Images/06_1-WW1-2.jpg')
background-size: 100%
background-position: center

???

And then 20 years later we decided to do it all again!

WW2 

- kills MORE people, 

- costs MORE money,

- destroys MORE of the global economy

- Pushes us to invent NUCLEAR WEAPONS!

&lt;br&gt;

It is the incredible death and destruction of WW1 and WW2 that leads to the birth of International Relations as a subfield of political science.

- The idea is to understand these horrible events so we can stop them.

&lt;br&gt;

As you know we use models in science to help us explain events.

### What models have we studied so far this term that try to explain war as an outcome?

+ Classical realism: Human nature is awful and peoples' basest wants lead to conflict, death and destruction

+ Neorealism: States want to survive, war comes from uncertainty and the security dilemma.

+ Offensive realism: Powerful states want hegemony and war comes from the pursuit of it!

???

This week we jump forward in IR theory by a few decades!

&lt;br&gt;

James Fearon in 1995 published an article titled, "Rationalist Explanations for War."

- In it he offers a really interesting model of war as a bargaining process.

- Two sides with opposing goals each trying to get what they want without having to pay too high a cost to get it.

&lt;br&gt;

My plan for today is that each of you experience the dynamics of the model before we analyze it on Wednesday.

]

???

*Review details*

Everyone starts the game with 10 pennies and playing cards.

&lt;br&gt;

Ok, how do we play?

- It's pretty simple...


---

&lt;img src="06_1-Penny_War_files/figure-html/unnamed-chunk-2-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

### 1. Ante up.

- Both players ante up 1 "penny" into the pot, and draw three cards from their deck.

- The penny you pay to start represents the cost of running your country



---

&lt;img src="06_1-Penny_War_files/figure-html/unnamed-chunk-3-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

### 2. P1 Choice: Give up or fight!

- If P1 concedes, P2 gets the pot and the round ends

- If P1 demands the pot (war), P2 gets a choice...



---

&lt;img src="06_1-Penny_War_files/figure-html/unnamed-chunk-4-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

### 3. Choice shifts to P2: Give up or fight!

- If P2 concedes, P1 gets the pot and the round ends

- If P2 resists, you go to war!




---

&lt;img src="06_1-Penny_War_files/figure-html/unnamed-chunk-5-1.png" width="95%" style="display: block; margin: auto;" /&gt;

???

### 4. War

If both players declare war:

- Cost of war: You have to pay for the tanks and losses to your economy!

- Show your cards, stronger side wins

&lt;br&gt;

Each round you'll alternate being P1 and we'll play five rounds.

&lt;br&gt;

### Questions on the game?

&lt;img src="06_1-Penny_War_files/figure-html/unnamed-chunk-6-1.png" width="95%" style="display: block; margin: auto;" /&gt;
