???

The big over-arching goal for today is to practice thinking like a political scientist.

At times this is going to feel very abstract and theoretical, but the time we spend practicing these abstractions today will help you A TON next week when we begin exploring cutting-edge political science research.

Think of this like learning the alphabet of social science.

???

Remember, a scientific model is like a map.

It is a simplification of the world that allows us to better understand causality.

In other words, why things happen they way they do and what we can do to manipulate those things.

Let's start by figuring out the output of our model.

* ON BOARD *

Help me brainstorm the different outcomes of our game we could use a model to explain.

- Think about the big decision moments in the game and what happened after them.

(- coop in first round, total uncertainty)
(- coop after first round, less uncertainty?)
(- coop after being "betrayed")
(- the actual final outcome we reached)
(- etc.)

(- Choosing to cooperate or defect in the 1st round)
(- Choosing to cooperate after the other side defects)
(- Choosing to cooperate after the other side defects repeatedly)
(- Choosing to cooperate after the other side breaks their word)
(- Choosing to cooperate in the final round)

&lt;br&gt;

ANY NON-POINTS BASED OUTCOMES YOU WANT TO CONSIDER?
* A complex idea, but can be super important *

(Internal group dynamics?)
- How did you decide how to decide?
- How did you decide when to speak up or not?

(- Cross-group dynamics?)

&lt;br&gt;

Ok, now we have our outcomes to explain.


---

class: middle, slideblue

.size50[**Frieden, Lake and Schultz (2016)**]

.size30[
**Interests**

"…[The] preferences of actors over the possible outcomes that might result from their political choices" (45).

**Interactions**

"The ways in which the choices of two or more actors combine to produce political outcomes" (51).

**Institutions**

"A set of rules, known and shared by the community, that structure political interactions in particular ways" (67).
]

???

Here are the three key concepts from the reading for this week and how the authors, Frieden, Lake and Schultz, define them.

Think of interests, interactions and institutions as a shortcut to designing a model of political behavior.

ANY QUESTIONS ON THESE THREE CONCEPTS?

DO WE UNDERSTAND HOW THESE HELP US DESIGN A MODEL OF BEHAVIOR OR DECISION-MAKING?

The interests tell us who is making the decisions and what they want.

The institutions tell us what are the rules that matter.

The interactions tells us what happens when these different interests collide.

???

Bottom line, my hope is that this work today has helped you think about our simulation more deeply.

Building models requires breaking complex situations down into their component pieces and thinking carefully about how each piece works on its own and when colliding with the other pieces.

GIVEN YOUR WORK TODAY, HOW CONFIDENT ARE YOU THAT YOU COULD TWEAK THE PD GAME WE PLAYED TO ENCOURAGE CERTAIN SPECIFIC OUTCOMES?

- e.g. FORCE THE PLAYERS TO DO SOMETHING YOU WANT THEM TO DO...

&lt;br&gt;

More important than that, I hope you are starting to see how these skills connect to the real world.

If you can get specific about the thing you are trying to explain (the outcome), thinking about the interests, institutions and interactions will help you structure ANY investigation.

Why do wars happen?

Can we stop international terrorism?

What should we do about famine and global poverty?

&lt;br&gt;

Huge questions have to be broken down into smaller pieces.

We can then carefully examine these smaller pieces that explain some part of the outcome.

Once we identify these causal mechanisms we can then try to alter the outcomes we care about on the global stage.

&lt;br&gt;

IN OTHER WORDS, ARE YOU STARTING TO SEE HOW MODELS CAN BE USED TO MANIPULATE COMPLEX SOCIAL SYSTEMS?

Scary powerful once you see the world this way...

ANY QUESTIONS ON THIS?
